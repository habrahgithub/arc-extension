<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      font-size: 16px;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0e0e0e;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #343c45;
    }

<body class="bg-background text-on-surface font-body selection:bg-primary/30 h-screen overflow-hidden">
<div class="flex h-full w-[160px] bg-surface flex-col border-r border-outline-variant/15">
<!-- TopAppBar Fragment: Branding & Title -->
<header class="bg-[#0e0e0e] flex justify-between items-center w-full px-2 h-10 border-b border-white/10 shrink-0">
<div class="flex items-center gap-1.5">
<span class="text-lg font-bold text-[#9fcaff] tracking-tighter font-headline">ARC XT</span>
</div>
<div class="flex gap-1">
<span class="material-symbols-outlined text-[#9fcaff] cursor-pointer hover:bg-[#ffffff0d] transition-colors p-1 rounded">settings</span>
</div>
</header>
<!-- Context/Path Header: Nested Monolith -->
<div class="bg-surface-container-low px-2 py-3 border-b border-outline-variant/10">
<div class="flex flex-col gap-1">
<span class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest opacity-60">WORKSPACE</span>
<span class="font-mono text-[11px] text-primary truncate leading-none">/workspaces/arc-xt</span>
</div>
<div class="mt-3 flex flex-wrap gap-1.5">
<!-- Status Badge: ARC Config -->
<div class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-tertiary-container text-on-tertiary-container text-[9px] font-bold">
<span class="material-symbols-outlined !text-[10px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
          CONFIG
        </div>
<!-- Status Badge: Blueprints -->
<div class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-secondary-container text-on-secondary-container text-[9px] font-bold">
<span class="material-symbols-outlined !text-[10px]">architecture</span>
          BP
        </div>
</div>
</div>
<!-- Main Navigation / Sections -->
<nav class="flex-1 overflow-y-auto custom-scrollbar py-2">
<!-- Section Title -->
<div class="px-2 mb-2">
<div class="flex items-center justify-between">
<span class="text-[10px] font-headline font-bold text-on-surface-variant uppercase tracking-wider">Active Task</span>
<span class="h-[1px] flex-1 bg-outline-variant/15 ml-2"></span>
</div>
</div>
<!-- Active Task Row -->
<div class="group px-2 py-2 mx-1 bg-surface-container-high border-l-2 border-primary transition-all duration-150 mb-4 cursor-pointer">
<div class="flex flex-col gap-1">
<div class="flex justify-between items-start">
<span class="text-[10px] font-mono text-on-surface-variant">ARC-101</span>
<span class="material-symbols-outlined text-primary !text-[14px]">bolt</span>
</div>
<span class="text-[11px] font-medium leading-tight text-on-surface">Fix blueprint validation</span>
</div>
</div>
<!-- System Status Section -->
<div class="px-2 mb-2 mt-2">
<div class="flex items-center justify-between">
<span class="text-[10px] font-headline font-bold text-on-surface-variant uppercase tracking-wider">Control</span>
<span class="h-[1px] flex-1 bg-outline-variant/15 ml-2"></span>
</div>
</div>
<!-- Tonal Stepping Menu Items -->
<div class="flex flex-col gap-0.5 px-1">
<div class="flex items-center gap-2 px-2 py-1.5 hover:bg-[#2a2d2e] transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">dashboard_customize</span>
<span class="text-[11px] font-body text-on-surface-variant group-hover:text-on-surface">Open Full Board</span>
</div>
<div class="flex items-center gap-2 px-2 py-1.5 hover:bg-[#2a2d2e] transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">terminal</span>
<span class="text-[11px] font-body text-on-surface-variant group-hover:text-on-surface">Runtime Status</span>
</div>
<!-- Route Mode Switcher -->
<div class="mt-4 px-2 py-2 bg-surface-container-lowest rounded-sm border border-outline-variant/10">
<div class="flex flex-col gap-1.5">
<span class="text-[9px] font-mono text-on-surface-variant/70 tracking-tighter">ROUTE_MODE</span>
<div class="flex items-center justify-between bg-surface-container p-1 rounded-sm">
<span class="text-[10px] font-mono text-tertiary-fixed-dim">RULE_ONLY</span>
<span class="material-symbols-outlined text-tertiary-fixed-dim !text-[12px]" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
</div>
</div>
</div>
</nav>
<!-- SideNavBar Footer Fragment -->
<footer class="mt-auto border-t border-outline-variant/15 p-2 bg-surface-dim">
<button class="w-full bg-primary py-1.5 rounded-sm flex items-center justify-center gap-1.5 transition-all active:opacity-80 hover:brightness-110">
<span class="material-symbols-outlined text-on-primary !text-[14px]">play_arrow</span>
<span class="text-[10px] font-bold text-on-primary font-headline tracking-tighter uppercase">EXECUTE_RUN</span>
</button>

</div>
<div class="flex flex-col overflow-hidden">
<span class="text-[10px] font-bold text-on-surface leading-none truncate">ARCHITECT_01</span>
<span class="text-[9px] text-on-surface-variant/60 font-mono tracking-tighter">ENGINEERING_CORE</span>
</div>
</div>
</footer>
</div>
